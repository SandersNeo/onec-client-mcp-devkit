# Separate v8-runner project for live MCP protocol UAT.
basePath: '../..'
workPath: '../../build/uat/mcp-protocol'
execution_timeout: 900000
format: EDT
builder: DESIGNER
infobase:
  connection: 'File=../../build/uat/mcp-protocol/ib'
source-set:
  - name: configuration
    type: CONFIGURATION
    path: 'fixtures/configuration'

  - name: client_mcp
    type: EXTENSION
    path: 'exts/client-mcp'
    disable_safety: true

  - name: test_client
    type: EXTENSION
    path: 'exts/test_client'
tools:
  platform:
    version: '8.3.27'
  edt-cli:
    interactive-mode: true
  enterprise:
    additional-launch-keys:
      - /TESTMANAGER
build:
  partialLoadThreshold: 20
tests:
  execution_timeout_seconds: 900
