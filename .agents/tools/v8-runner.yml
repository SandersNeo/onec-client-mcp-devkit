app:
  id: client-mcp-devkit
  format: EDT
  source-set:
    - path: fixtures/configuration
      name: configuration
      type: CONFIGURATION
      purpose: [MAIN]
    - path: exts/client-mcp
      name: ClientMcp
      type: EXTENSION
      purpose: [MAIN]
    - path: tests/src
      name: tests
      type: EXTENSION
      purpose: [TESTS, YAXUNIT]
  tools:
    enterprise:
      additional-launch-keys:
        - "/TESTMANAGER"
