name: CI

on:
  push:
    branches:
      - master
      - main
    paths:
      - ".github/workflows/**"
      - "exts/**"
      - "fixtures/**"
      - "tests/**"
  pull_request:
    branches:
      - master
      - main
    paths:
      - ".github/workflows/**"
      - "exts/**"
      - "fixtures/**"
      - "tests/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  id-token: write

env:
  V8_VERSION: 8.3.20.1549
  EDT_VERSION: 2025.2.3
  LANG: ru_RU.UTF-8

jobs:
  export_to_designer:
    name: Export EDT sources
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Prepare Linux runtime
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            locales \
            xvfb \
            x11-utils
          sudo localedef -i ru_RU -c -f UTF-8 -A /usr/share/locale/locale.alias ru_RU.UTF-8

      - name: Install 1C:EDT
        uses: 1CDevFlow/onec-setup-action@e1cd5937cb951c3cdeda4bf482f89da5f5e0b148
        with:
          type: edt
          edt_version: ${{ env.EDT_VERSION }}
          cache: false
        env:
          ONEC_USERNAME: ${{ secrets.ONEC_USERNAME }}
          ONEC_PASSWORD: ${{ secrets.ONEC_PASSWORD }}
        timeout-minutes: 30

      - name: Prepare EDT CLI
        run: |
          set -euo pipefail
          edt_cli="$(command -v 1cedtcli.sh || true)"
          if [ -z "$edt_cli" ]; then
            edt_cli="$(command -v 1cedtcli || true)"
          fi
          if [ -z "$edt_cli" ]; then
            edt_cli="$(find /opt/1C -type f \( -name 1cedtcli.sh -o -name 1cedtcli \) -print -quit)"
          fi
          if [ -z "$edt_cli" ]; then
            echo "EDT CLI not found" >&2
            find /opt/1C -type f -name '1cedtcli*' -print >&2 || true
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/edt-cli"
          ln -sf "$edt_cli" "$RUNNER_TEMP/edt-cli/1cedtcli.sh"
          echo "$RUNNER_TEMP/edt-cli" >> "$GITHUB_PATH"
          echo "EDT_CLI=$edt_cli" >> "$GITHUB_ENV"

      - name: Prepare export directories
        run: mkdir -p export/configuration export/client_mcp export/test_client export/tests

      - name: Export EDT sources
        run: |
          set -euo pipefail
          edt_cli="$EDT_CLI"
          workspace="$RUNNER_TEMP/ws"
          echo "Using EDT CLI: $edt_cli"

          show_diagnostics() {
            ps -ef | grep -E '1cedt|java|eclipse' | grep -v grep || true
            find "$workspace" -path '*/.metadata/.log' -type f -print -exec tail -200 {} \; || true
          }

          wait_for_export() {
            export_path="$1"
            for _ in $(seq 1 60); do
              if find "$export_path" -type f -print -quit | grep -q .; then
                return 0
              fi
              sleep 2
            done
            echo "$export_path is empty" >&2
            show_diagnostics
            exit 1
          }

          export_project() {
            source_path="$1"
            export_path="$2"
            rm -rf "$export_path"
            mkdir -p "$export_path"
            xvfb-run -a "$edt_cli" -data "$workspace" -timeout 900 -v -command export --configuration-files "$PWD/$export_path" --project "$PWD/$source_path"
            wait_for_export "$export_path"
          }

          export_project fixtures/configuration export/configuration
          export_project exts/client-mcp export/client_mcp
          export_project exts/test_client export/test_client
          export_project tests export/tests
        timeout-minutes: 20

      - name: Pack Designer sources
        run: |
          cd export
          7za a -t7z ../export.7z ./

      - name: Upload Designer sources
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: designer-src
          path: export.7z
          if-no-files-found: error
          retention-days: 1

  build_artifacts:
    name: Build artifacts
    needs: export_to_designer
    runs-on: windows-latest
    timeout-minutes: 40
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Install 1C:Enterprise
        uses: 1CDevFlow/onec-setup-action@e1cd5937cb951c3cdeda4bf482f89da5f5e0b148
        with:
          type: onec
          onec_version: ${{ env.V8_VERSION }}
          cache: true
        env:
          ONEC_USERNAME: ${{ secrets.ONEC_USERNAME }}
          ONEC_PASSWORD: ${{ secrets.ONEC_PASSWORD }}
        timeout-minutes: 15

      - name: Download Designer sources
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: designer-src

      - name: Unpack Designer sources
        run: |
          mkdir export
          mkdir binary
          mkdir server-data
          cd export
          7z x ../export.7z -y

      - name: Create infobase
        run: ibcmd infobase --data="$env:GITHUB_WORKSPACE/server-data" --db-path=file-db create --import=export\configuration --apply --force
        timeout-minutes: 5

      - name: Import client_mcp extension
        run: ibcmd infobase --data="$env:GITHUB_WORKSPACE/server-data" --db-path=file-db config import --extension=client_mcp export\client_mcp
        timeout-minutes: 5

      - name: Import test_client extension
        run: ibcmd infobase --data="$env:GITHUB_WORKSPACE/server-data" --db-path=file-db config import --extension=test_client export\test_client
        timeout-minutes: 5

      - name: Import tests extension
        run: ibcmd infobase --data="$env:GITHUB_WORKSPACE/server-data" --db-path=file-db config import --extension=tests export\tests
        timeout-minutes: 5

      - name: Save client_mcp extension
        run: ibcmd infobase --data="$env:GITHUB_WORKSPACE/server-data" --db-path=file-db config save --extension=client_mcp binary\client_mcp.cfe
        timeout-minutes: 5

      - name: Save test_client extension
        run: ibcmd infobase --data="$env:GITHUB_WORKSPACE/server-data" --db-path=file-db config save --extension=test_client binary\test_client.cfe
        timeout-minutes: 5

      - name: Save tests extension
        run: ibcmd infobase --data="$env:GITHUB_WORKSPACE/server-data" --db-path=file-db config save --extension=tests binary\tests.cfe
        timeout-minutes: 5

      - name: Save configuration
        run: ibcmd infobase --data="$env:GITHUB_WORKSPACE/server-data" --db-path=file-db config save binary\configuration.cf
        timeout-minutes: 5

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: build-artifacts
          path: binary\*.*
          if-no-files-found: error
          retention-days: 1

  yaxunit:
    name: YaXUnit
    needs: build_artifacts
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Prepare Linux runtime
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            locales \
            xvfb \
            x11-utils \
            net-tools \
            libenchant-2-2 \
            libglu1-mesa \
            libwebkit2gtk-4.0-37 \
            libgstreamer-plugins-base1.0-0 \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libenchant-2.so.2 /usr/lib/libenchant.so.1
          sudo localedef -i ru_RU -c -f UTF-8 -A /usr/share/locale/locale.alias ru_RU.UTF-8
          mkdir -p ~/.1cv8/1C/1cv8/conf/
          echo "DisableUnsafeActionProtection=.*" >> ~/.1cv8/1C/1cv8/conf/conf.cfg
          sudo ldconfig

      - name: Install 1C:Enterprise
        uses: 1CDevFlow/onec-setup-action@e1cd5937cb951c3cdeda4bf482f89da5f5e0b148
        with:
          type: onec
          onec_version: ${{ env.V8_VERSION }}
          cache: true
        env:
          ONEC_USERNAME: ${{ secrets.ONEC_USERNAME }}
          ONEC_PASSWORD: ${{ secrets.ONEC_PASSWORD }}
        timeout-minutes: 15

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: build-artifacts
          path: binary

      - name: Create infobase
        run: |
          mkdir -p server-data
          ibcmd infobase --data="$GITHUB_WORKSPACE/server-data" --db-path=file-db create --load=binary/configuration.cf --apply --force
        timeout-minutes: 5

      - name: Load client_mcp extension
        run: |
          ibcmd infobase --data="$GITHUB_WORKSPACE/server-data" --db-path=file-db config load --extension=client_mcp --force binary/client_mcp.cfe
          ibcmd infobase --data="$GITHUB_WORKSPACE/server-data" --db-path=file-db config extension update --name=client_mcp --safe-mode=no --unsafe-action-protection=no
          ibcmd infobase --data="$GITHUB_WORKSPACE/server-data" --db-path=file-db config apply --extension=client_mcp --force

      - name: Load test_client extension
        run: |
          ibcmd infobase --data="$GITHUB_WORKSPACE/server-data" --db-path=file-db config load --extension=test_client --force binary/test_client.cfe
          ibcmd infobase --data="$GITHUB_WORKSPACE/server-data" --db-path=file-db config extension update --name=test_client --safe-mode=no --unsafe-action-protection=no
          ibcmd infobase --data="$GITHUB_WORKSPACE/server-data" --db-path=file-db config apply --extension=test_client --force

      - name: Load tests extension
        run: |
          ibcmd infobase --data="$GITHUB_WORKSPACE/server-data" --db-path=file-db config load --extension=tests --force binary/tests.cfe
          ibcmd infobase --data="$GITHUB_WORKSPACE/server-data" --db-path=file-db config extension update --name=tests --safe-mode=no --unsafe-action-protection=no
          ibcmd infobase --data="$GITHUB_WORKSPACE/server-data" --db-path=file-db config apply --extension=tests --force

      - name: Create YaXUnit config
        run: |
          cat > yaxunit-config.json <<'JSON'
          {
            "reportFormat": "jUnit",
            "reportPath": "report.xml",
            "closeAfterTests": true,
            "exitCode": "exit-code.txt",
            "logging": {
              "console": true,
              "file": "log.txt"
            }
          }
          JSON

      - name: Run YaXUnit tests
        run: |
          set -euo pipefail
          ibsrv --data="$GITHUB_WORKSPACE/server-data" --db-path=file-db --daemon &
          sleep 5

          echo "Checking ibsrv process..."
          ps aux | grep ibsrv || echo "ibsrv process not found"

          echo "Checking ibsrv port..."
          netstat -tlnp | grep 8314 || echo "port 8314 is not listening"

          xvfb-run -a -s "-screen 0 1024x768x24" 1cv8c /TESTMANAGER /WS "http://localhost:8314" /C"RunUnitTests=yaxunit-config.json" /L ru /VL ru_RU /DisableStartupDialogs /DisableStartupMessages /DisableUnrecoverableErrorMessage /Out output.log
        env:
          DISPLAY: ":99"
          LANG: ru_RU.UTF-8
        timeout-minutes: 15

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: yaxunit-report
          path: |
            report.xml
            log.txt
            output.log
            exit-code.txt
          if-no-files-found: ignore
          retention-days: 7

      - name: Publish YaXUnit report
        if: always()
        uses: 1CDevFlow/action-onec-junit-report@a76ff370af97ae96419efd9f24ed77f64436d986
        with:
          job_name: YaXUnit
          check_name: YaXUnit report
          report_paths: report.xml
          fail_on_failure: true
          require_passed_tests: true

      - name: Show YaXUnit log
        if: always()
        run: cat log.txt
        continue-on-error: true

      - name: Show 1C log
        if: always()
        run: cat output.log
        continue-on-error: true

      - name: Cleanup processes
        if: always()
        run: |
          pkill -f ibsrv || echo "ibsrv processes not found"
          pkill -f xvfb || echo "xvfb processes not found"
